<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Tier</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
    </header>

    <nav>
        <h1>Food Tier List</h1>
        <a href="#">Create Tier List</a>
        <a href="#">View Comunity Lists</a>
    </nav>

    <main>
        <section id="hero">
            <h1>Food Tier List</h1>
            <p>Create and explore the world of Foods through lists</p>
            <button>Post Ranking</button>
        </section>

        <section id="tier-row">
            <div class="tier-label">S</div>
            <div class="tier-items"></div>

            <div class="tier-label">A</div>
            <div class="tier-items"></div>

            <div class="tier-label">B</div>
            <div class="tier-items"></div>

            <div class="tier-label">C</div>
            <div class="tier-items"></div>

            <div class="tier-label">D</div>
            <div class="tier-items"></div>

            <div class="tier-label">F</div>
            <div class="tier-items"></div>
        </section>

        <section>
            <div class="grid">
                <div class="food-card">
                    <span class="emoji">🍕</span>
                    <p>Pizza</p>
                </div>
                <div class="food-card">
                    <span class="emoji">🍔</span>
                    <p>Burger</p>
                </div>
                <div class="food-card">
                    <span class="emoji">🍦</span>
                    <p>Ice cream</p>
                </div>
                <div class="food-card">
                    <span class="emoji">🍟</span>
                    <p>French Fries</p>
                </div>
            </div>
        </section>

        <section>
            <button>Generate craving</button>
            <p id="craving-result">...</p>
        </section>

    </main>

    <footer>
        <small>
            Made By Lirio, Powered by late-night coding
        </small>
    </footer>

</body>
</html>
